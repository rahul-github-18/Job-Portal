<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recruiter Profile - TalentTrack</title>

    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} "/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}" />

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2b3445;
            margin: 0;
            padding: 0;
        }

        .form-page-wrapper {
            padding: 40px 20px 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 76px);
        }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.04);
            max-width: 800px;
            width: 100%;
            padding: 44px 56px;
            transition: all 0.3s ease;
        }

        /* HEADER SECTION */
        .form-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f2f5;
        }

        .header-icon-box {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(251, 79, 20, 0.15) 0%, rgba(231, 69, 16, 0.05) 100%);
            color: #fb4f14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .header-title-area h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0A1931;
            margin: 0 0 4px;
            letter-spacing: -0.5px;
        }

        .header-title-area p {
            font-size: 14.5px;
            color: #6c757d;
            margin: 0;
            font-weight: 500;
        }

        /* SECTION TITLES */
        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #0A1931;
            margin: 28px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-section-title i {
            color: #fb4f14;
            font-size: 16px;
        }

        /* INPUT FIELDS */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #344054;
            margin-bottom: 8px;
            display: inline-block;
        }

        .form-control {
            height: 52px;
            border-radius: 14px;
            border: 1px solid #dfe3e8;
            padding: 0 18px;
            font-size: 15px;
            font-weight: 500;
            color: #2b3445;
            background-color: #f8f9fa;
            transition: all 0.25s ease;
            box-shadow: none !important;
        }

        .form-control:focus {
            border-color: #4f6edb;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(79, 110, 219, 0.15) !important;
            outline: none;
        }

        .form-control::placeholder {
            color: #a0b2c6;
            font-weight: 400;
        }

        /* DRAG AND DROP FILE UPLOAD CARD */
        .file-upload-card {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            background: #f8fafc;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .file-upload-card:hover {
            border-color: #fb4f14;
            background: #fff8f6;
        }

        .file-upload-card i {
            font-size: 36px;
            color: #fb4f14;
            margin-bottom: 12px;
        }

        .file-upload-card h5 {
            font-size: 15px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 4px;
        }

        .file-upload-card p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
        }

        .file-upload-card input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .current-photo-preview {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            padding: 16px;
            background: #f0f4f8;
            border-radius: 16px;
            border: 1px solid #dfe3e8;
        }

        .current-photo-preview img {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .current-photo-preview .info h6 {
            margin: 0 0 4px;
            font-size: 15px;
            font-weight: 700;
            color: #0A1931;
        }
        
        .current-photo-preview .info p {
            margin: 0;
            font-size: 13px;
            color: #6c757d;
        }

        /* BUTTONS */
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid #f0f2f5;
        }

        .btn-form {
            height: 50px;
            padding: 0 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none !important;
        }

        .btn-cancel {
            background-color: white;
            color: #6c757d;
            border: 1px solid #dfe3e8;
        }

        .btn-cancel:hover {
            background-color: #f8f9fa;
            color: #0A1931;
            border-color: #c9d7e8;
            transform: translateY(-2px);
        }

        .btn-save {
            background: linear-gradient(90deg, #fb4f14 0%, #e74510 100%);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(251, 79, 20, 0.25);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(251, 79, 20, 0.35);
            color: white;
        }

        @media (max-width: 768px) {
            .form-card { padding: 32px 24px; }
            .form-actions { flex-direction: column; gap: 12px; }
            .btn-form { width: 100%; }
        }
    </style>
</head>

<body>
<header th:replace="~{fragments/app-nav :: appNav}"></header>

<div class="form-page-wrapper">
    <div class="form-card">
        <div class="form-header">
            <div class="header-icon-box">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <div class="header-title-area">
                <h1>Recruiter Profile</h1>
                <p>Set up your company profile and professional identity</p>
            </div>
        </div>

        <form th:action="@{/recruiter-profile/addNew}" th:object="${profile}" method="post" enctype="multipart/form-data">
            <div class="form-section-title"><i class="fa-solid fa-id-card"></i> Personal Information</div>
            
            <div class="row">
                <div class="col-md-6 form-group">
                    <label for="firstName">First Name <span class="text-danger">*</span></label>
                    <input placeholder="First Name" id="firstName" th:field="*{firstName}" name="firstName" type="text" class="form-control" required />
                </div>
                <div class="col-md-6 form-group">
                    <label for="lastName">Last Name <span class="text-danger">*</span></label>
                    <input placeholder="Last Name" id="lastName" th:field="*{lastName}" name="lastName" type="text" class="form-control" required />
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-building"></i> Company Information</div>

            <div class="row">
                <div class="col-md-12 form-group">
                    <label for="company">Company Name <span class="text-danger">*</span></label>
                    <input placeholder="e.g. Acme Corporation" id="company" th:field="*{company}" name="company" type="text" class="form-control" required />
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-location-dot"></i> Location</div>

            <div class="row">
                <div class="col-md-4 form-group">
                    <label for="city">City <span class="text-danger">*</span></label>
                    <input placeholder="City" id="city" th:field="*{city}" name="city" type="text" class="form-control" required />
                </div>
                <div class="col-md-4 form-group">
                    <label for="state">State / Province <span class="text-danger">*</span></label>
                    <input placeholder="State" id="state" th:field="*{state}" name="state" type="text" class="form-control" required />
                </div>
                <div class="col-md-4 form-group">
                    <label for="country">Country <span class="text-danger">*</span></label>
                    <input placeholder="Country" id="country" th:field="*{country}" name="country" type="text" class="form-control" required />
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-image"></i> Profile Photo Upload</div>

            <div class="row">
                <div class="col-md-12 form-group">
                    <div class="current-photo-preview" th:if="${profile.profilePhoto != null && !profile.profilePhoto.isEmpty()}">
                        <img th:src="@{${profile.photosImagePath}}" alt="Current Profile Photo" />
                        <div class="info">
                            <h6>Current Company Logo / Photo</h6>
                            <p><i class="fa-solid fa-circle-check text-success"></i> Active and displayed on job postings</p>
                        </div>
                    </div>

                    <div class="file-upload-card">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <h5>Click to upload or drag and drop</h5>
                        <p>PNG or JPEG (Max size: 5MB)</p>
                        <input id="image" type="file" name="image" accept="image/png, image/jpeg" onchange="updateUploadLabel(this, 'photo-label')" />
                        <p id="photo-label" class="mt-2 text-success font-weight-bold" style="display: none;"></p>
                    </div>
                    <input type="text" name="profilePhoto" th:field="*{profilePhoto}" class="form-control" hidden />
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/dashboard/}" class="btn-form btn-cancel"><i class="fa-solid fa-xmark"></i> Cancel</a>
                <button type="submit" id="submit2" name="submit" class="btn-form btn-save"><i class="fa-solid fa-check"></i> Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
<script type="text/javascript" th:src="@{/js/main.js}"></script>

<script>
    function updateUploadLabel(input, labelId) {
        var label = document.getElementById(labelId);
        if (input.files && input.files[0]) {
            label.style.display = 'block';
            label.innerHTML = '<i class="fa-solid fa-file-circle-check"></i> Selected: ' + input.files[0].name;
        } else {
            label.style.display = 'none';
        }
    }
</script>

</body>
</html>
