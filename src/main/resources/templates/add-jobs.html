<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${jobPostActivity.jobPostId != null ? 'Edit Job - TalentTrack' : 'Post New Job - TalentTrack'}">Post New Job</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link th:rel="stylesheet" type="text/css" media="all" th:href="@{/summernote/summernote-lite.min.css}"/>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css} "/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" media="all" th:href="@{/css/styles.css}" />

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #2b3445;
            margin: 0;
            padding: 0;
        }

        .form-page-wrapper {
            padding: 40px 20px 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 76px);
        }

        .form-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.04);
            max-width: 850px;
            width: 100%;
            padding: 44px 56px;
            transition: all 0.3s ease;
        }

        /* HEADER SECTION */
        .form-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f0f2f5;
        }

        .header-icon-box {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(251, 79, 20, 0.15) 0%, rgba(231, 69, 16, 0.05) 100%);
            color: #fb4f14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .header-title-area h1 {
            font-size: 26px;
            font-weight: 800;
            color: #0A1931;
            margin: 0 0 4px;
            letter-spacing: -0.5px;
        }

        .header-title-area p {
            font-size: 14.5px;
            color: #6c757d;
            margin: 0;
            font-weight: 500;
        }

        /* SECTION TITLES */
        .form-section-title {
            font-size: 16px;
            font-weight: 700;
            color: #0A1931;
            margin: 28px 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-section-title i {
            color: #fb4f14;
            font-size: 16px;
        }

        /* INPUT FIELDS */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #344054;
            margin-bottom: 8px;
            display: inline-block;
        }

        .form-control, .form-select {
            height: 52px;
            border-radius: 14px;
            border: 1px solid #dfe3e8;
            padding: 0 18px;
            font-size: 15px;
            font-weight: 500;
            color: #2b3445;
            background-color: #f8f9fa;
            transition: all 0.25s ease;
            box-shadow: none !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #4f6edb;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(79, 110, 219, 0.15) !important;
            outline: none;
        }

        .form-control::placeholder {
            color: #a0b2c6;
            font-weight: 400;
        }

        .form-control[readonly] {
            background-color: #eef2f6;
            color: #6c757d;
            cursor: not-allowed;
            border-color: #dbe0e5;
        }

        /* SUMMERNOTE CUSTOMIZATION */
        .note-editor.note-frame {
            border-radius: 16px !important;
            border: 1px solid #dfe3e8 !important;
            overflow: hidden;
            box-shadow: none !important;
            background: #f8f9fa;
            transition: all 0.25s ease;
        }

        .note-editor.note-frame:focus-within {
            border-color: #4f6edb !important;
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 110, 219, 0.15) !important;
        }

        .note-toolbar {
            background-color: #f0f4f8 !important;
            border-bottom: 1px solid #dfe3e8 !important;
            padding: 8px 14px !important;
        }

        .note-editable {
            padding: 20px !important;
            font-size: 15px;
            line-height: 1.6;
            color: #2b3445;
            background: white;
            min-height: 180px;
        }

        /* BUTTONS */
        .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 40px;
            padding-top: 28px;
            border-top: 1px solid #f0f2f5;
        }

        .btn-form {
            height: 50px;
            padding: 0 32px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none !important;
        }

        .btn-cancel {
            background-color: white;
            color: #6c757d;
            border: 1px solid #dfe3e8;
        }

        .btn-cancel:hover {
            background-color: #f8f9fa;
            color: #0A1931;
            border-color: #c9d7e8;
            transform: translateY(-2px);
        }

        .btn-save {
            background: linear-gradient(90deg, #fb4f14 0%, #e74510 100%);
            color: white;
            border: none;
            box-shadow: 0 6px 15px rgba(251, 79, 20, 0.25);
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(251, 79, 20, 0.35);
            color: white;
        }

        @media (max-width: 768px) {
            .form-card { padding: 32px 24px; }
            .form-actions { flex-direction: column; gap: 12px; }
            .btn-form { width: 100%; }
        }
    </style>
</head>

<body>
<header th:replace="~{fragments/app-nav :: appNav}"></header>

<div class="form-page-wrapper">
    <div class="form-card">
        <div class="form-header">
            <div class="header-icon-box">
                <i class="fa-solid fa-briefcase"></i>
            </div>
            <div class="header-title-area">
                <h1 th:text="${jobPostActivity.jobPostId != null ? 'Edit Job Posting' : 'Post New Job'}">Post New Job</h1>
                <p th:text="${jobPostActivity.jobPostId != null ? 'Update the details and requirements of your job opportunity' : 'Create a new job opportunity to find top talent'}">Create a new job opportunity to find top talent</p>
            </div>
        </div>

        <form id="job-main-form" th:action="@{/dashboard/addNew}" th:object="${jobPostActivity}" method="post" class="job-add-form">
            <input hidden type="text" th:field="*{jobPostId}">
            <input hidden type="text" th:field="*{jobLocationId.Id}">
            <input hidden type="text" th:field="*{jobCompanyId.Id}">

            <div class="form-section-title"><i class="fa-solid fa-circle-info"></i> Basic Job Details</div>
            
            <div class="row">
                <div class="col-lg-12 form-group">
                    <label for="title">Job Title <span class="text-danger">*</span></label>
                    <input id="title" type="text" th:field="*{jobTitle}" class="form-control" placeholder="e.g. Senior Software Engineer" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 form-group">
                    <label for="type">Employment Type <span class="text-danger">*</span></label>
                    <select id="type" th:field="*{jobType}" class="form-control form-select" required>
                        <option value="">Select Type</option>
                        <option th:value="Full-time">Full-time</option>
                        <option th:value="Part-time">Part-time</option>
                        <option th:value="Freelance">Freelance</option>
                        <option th:value="Internship">Internship</option>
                    </select>
                </div>
                <div class="col-md-4 form-group">
                    <label for="remote">Work Mode <span class="text-danger">*</span></label>
                    <select id="remote" th:field="*{remote}" class="form-control form-select" required>
                        <option value="">Select Mode</option>
                        <option th:value="Remote-Only">Remote-Only</option>
                        <option th:value="Office-Only">Office-Only</option>
                        <option th:value="Partial-Remote">Partial-Remote (Hybrid)</option>
                    </select>
                </div>
                <div class="col-md-4 form-group">
                    <label for="salary">Salary / Stipend</label>
                    <input id="salary" th:field="*{salary}" type="text" class="form-control" placeholder="e.g. $100k - $120k / year">
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-file-lines"></i> Job Description</div>
            
            <div class="row">
                <div class="col-md-12 form-group">
                    <label for="content">Role Overview & Responsibilities <span class="text-danger">*</span></label>
                    <textarea rows="6" id="content" placeholder="Provide a detailed description of the role, requirements, and benefits..." class="form-control" th:field="*{descriptionOfJob}" autocomplete="off"></textarea>
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-location-dot"></i> Job Location</div>

            <div class="row">
                <div class="col-md-4 form-group">
                    <label for="city">City <span class="text-danger">*</span></label>
                    <input th:field="*{jobLocationId.city}" id="city" type="text" class="form-control" placeholder="e.g. San Francisco" required>
                </div>
                <div class="col-md-4 form-group">
                    <label for="state">State / Province <span class="text-danger">*</span></label>
                    <input id="state" th:field="*{jobLocationId.state}" type="text" class="form-control" placeholder="e.g. CA" required>
                </div>
                <div class="col-md-4 form-group">
                    <label for="country">Country <span class="text-danger">*</span></label>
                    <input id="country" th:field="*{jobLocationId.country}" type="text" class="form-control" placeholder="e.g. United States" required>
                </div>
            </div>

            <div class="form-section-title"><i class="fa-solid fa-building"></i> Hiring Company</div>

            <div class="row">
                <div class="col-lg-12 form-group">
                    <label for="companyName">Company Name</label>
                    <input id="companyName" th:field="*{jobCompanyId.name}" type="text" class="form-control" placeholder="Company Name" readonly>
                </div>
            </div>

            <div class="form-actions">
                <a th:href="@{/dashboard/}" class="btn-form btn-cancel"><i class="fa-solid fa-xmark"></i> Cancel</a>
                <button type="submit" name="submit" class="btn-form btn-save"><i class="fa-solid fa-check"></i> Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script type="text/javascript" th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
<script type="text/javascript" th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
<script type="text/javascript" th:src="@{/summernote/summernote-lite.min.js}"></script>
<script type="text/javascript" th:src="@{/js/main.js}"></script>

<script>
    $('#content').summernote({
        height: 220,
        toolbar: [
            ['style', ['style']],
            ['font', ['bold', 'underline', 'clear']],
            ['color', ['color']],
            ['para', ['ul', 'ol', 'paragraph']],
            ['table', ['table']],
            ['insert', ['link']],
            ['view', ['fullscreen', 'codeview', 'help']]
        ]
    });
</script>

</body>
</html>
